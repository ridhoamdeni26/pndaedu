# =============================================================================
#  PandaEducation - Development Stack
#
#  Services:
#    - app       Laravel + Vite + Octane FrankenPHP (HTTP)
#    - postgres  Database
#    - redis     Cache / sessions / queue
#
#  Usage:
#    docker compose up --build        # first run / after Dockerfile change
#    docker compose up                # normal start
#    docker compose down              # stop containers
#    docker compose logs -f app       # follow app logs
#    docker compose exec app bash     # shell into app container
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Laravel + Inertia React + Octane FrankenPHP
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pandaeducation/app:dev
    container_name: pandaeducation-app
    restart: unless-stopped
    tty: true
    stdin_open: true
    working_dir: /var/www/html
    ports:
      - "${APP_PORT:-80}:80"        # Laravel (Octane FrankenPHP) → http://pandaeducation.test
      - "${VITE_PORT:-5173}:5173"   # Vite HMR
    volumes:
      - ./src:/var/www/html
      - app_vendor:/var/www/html/vendor
      - app_node_modules:/var/www/html/node_modules
    environment:
      # ----- Database -------------------------------------------------------
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-pandaeducation}
      DB_USERNAME: ${DB_USERNAME:-panda}
      DB_PASSWORD: ${DB_PASSWORD:-panda_secret}
      # ----- Redis ----------------------------------------------------------
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      # ----- App ------------------------------------------------------------
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://pandaeducation.test}
      VITE_PORT: ${VITE_PORT:-5173}
      # ----- File watching (Windows + WSL2 bind-mount fix) ------------------
      # inotify events do NOT propagate through Docker Desktop's WSL2 layer.
      # These env vars force chokidar (used by both Vite and Octane --watch)
      # to poll the filesystem instead of relying on inotify.
      CHOKIDAR_USEPOLLING: "1"
      CHOKIDAR_INTERVAL: "300"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pandanet

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pandaeducation-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-pandaeducation}
      POSTGRES_USER: ${DB_USERNAME:-panda}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-panda_secret}
      TZ: Asia/Jakarta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-panda} -d ${DB_DATABASE:-pandaeducation}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pandanet

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pandaeducation-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pandanet

# -----------------------------------------------------------------------------
# Networks & volumes
# -----------------------------------------------------------------------------
networks:
  pandanet:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_vendor:
    driver: local
  app_node_modules:
    driver: local
